<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Una Pregunta Muy Importante</title>

<style>
body {
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

h1 {
    font-size: 2.5rem;
    color: white;
}

button {
    padding: 15px 30px;
    font-size: 1.2rem;
    margin: 10px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.3s;
}

#yesBtn {
    background-color: #4CAF50;
    color: white;
}

#noBtn {
    background-color: #f44336;
    color: white;
}

button:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>

<h1 id="question">¿Querés ser mi esposa?</h1>

<div id="buttons">
    <button id="yesBtn">Sí 💍</button>
    <button id="noBtn">No 😅</button>
</div>

<script>
let question = document.getElementById("question");
let noBtn = document.getElementById("noBtn");
let yesBtn = document.getElementById("yesBtn");

yesBtn.addEventListener("click", function() {
    question.innerHTML = "Felicidades, ahora sos mi esposa bella 💖👰";
    document.getElementById("buttons").style.display = "none";
    document.body.style.background = "linear-gradient(135deg, #a1ffce, #faffd1)";
});

noBtn.addEventListener("click", function() {
    question.innerHTML = "¿Estás segura? 🤨";
});
</script>

</body>
</html>
